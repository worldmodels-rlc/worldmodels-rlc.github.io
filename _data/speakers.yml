- id: 5
  name: Cyrus Neary
  affiliation: University of British Columbia
  title: Assistant Professor
  pic: cyrus_neary
  status: Confirmed
  homepage: https://cyrusneary.com/
  bio: Assistant Professor in the Department of Electrical and Computer Engineering at the University of British Columbia, where he directs the Artificial Intelligence in Robotics & Engineering (AIRE) Lab. His research develops theory and algorithms for scalable, reliable AI in control, robotics, and autonomous systems, with interests in multiagent reinforcement learning, physics-informed machine learning, and safe use of large language models for autonomy. He received his Ph.D. from UT Austin and was previously a postdoctoral researcher at Mila and Université de Montréal.

