- id: 1
  name: Jack Parker-Holder
  affiliation: Google DeepMind
  title: Research Scientist
  pic: jack_parker_holder
  pic_ext: png
  status: Confirmed
  homepage: https://jparkerholder.github.io/
  bio: Research Scientist at Google DeepMind in the Open-Endedness team and Honorary Lecturer at University College London. His research focuses on training world models from internet-scale data to create unlimited training environments for embodied AI. He is known for leading the Genie project, a generative world model that learns interactive environments from video. He completed his DPhil at Oxford's Machine Learning Research Group.

- id: 2
  name: Danijar Hafner
  affiliation: Google DeepMind
  title: Staff Research Scientist
  pic: danijar_hafner
  status: Tentative
  homepage: https://danijar.com/
  bio: Staff Research Scientist at Google DeepMind in San Francisco. Creator of the Dreamer series of model-based RL agents, including DreamerV3, a single general-purpose algorithm that masters over 150 diverse tasks without task-specific tuning, whose results were published in Nature in 2025. His work is among the most influential in learning world models for reinforcement learning.

- id: 3
  name: Doina Precup
  affiliation: Google DeepMind & McGill University
  title: Research Team Leader & Associate Professor
  pic: doina_precup
  status: Confirmed
  homepage: https://doinaprecup.github.io/
  bio: Research Team Leader heading Google DeepMind's Montreal office, and Associate Professor in the School of Computer Science at McGill University and core member of Mila. Canada CIFAR AI Chair and Canada Research Chair in Machine Learning. A leading figure in reinforcement learning theory and practice, with broad contributions to temporal abstraction, representation learning, and policy optimization.

