<section id="contact">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">Contact</h2>
                    <h3 class="section-subheading text-muted">Questions about the workshop or submissions? Reach out to the organizers.</h3>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-8 col-lg-offset-2 text-center">
                    <p class="large text-muted">
                        <i class="fa fa-envelope-o fa-2x" style="display:block;margin-bottom:10px;"></i>
                        <a href="mailto:worldmodelworkshop@gmail.com">worldmodelworkshop@gmail.com</a>
                    </p>
                    <p class="text-muted">
                        {% for line in site.address %}{{ line.line }}<br>{% endfor %}
                    </p>
                </div>
            </div>
        </div>
    </section>
