<!-- Speakers Section -->
    <section id="speakers" class="bg-light-gray">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">Invited Speakers <span class="actively-updated-badge"><span class="hourglass-spin">⏳</span> actively updating</span></h2>
                    <h3 class="section-subheading text-muted">Leading researchers from academia and industry.</h3>
                </div>
            </div>
            <div class="row">
            {% for speaker in site.data.speakers %}
                <div class="col-md-4 col-sm-6 portfolio-item">
                    <a href="#speakerModal{{ speaker.id }}" class="portfolio-link" data-toggle="modal">
                        <div class="portfolio-hover">
                            <div class="portfolio-hover-content">
                                <i class="fa fa-search-plus fa-3x"></i>
                            </div>
                        </div>
                        {% assign pic_ext = speaker.pic_ext | default: "jpg" %}
                        {% if speaker.pic %}
                        <img src="img/speakers/{{ speaker.pic }}.{{ pic_ext }}" class="img-responsive" style="width:100%;height:330px;object-fit:cover;object-position:top;" alt="{{ speaker.name }}">
                        {% else %}
                        <div class="speaker-card-img text-center" style="background:#378ADD; padding:40px 0;">
                            <i class="fa fa-user fa-5x" style="color:#fff;"></i>
                        </div>
                        {% endif %}
                    </a>
                    <div class="portfolio-caption">
                        <h4>{{ speaker.name }}</h4>
                        <p class="text-muted">{{ speaker.affiliation }}</p>
                    </div>
                </div>
            {% endfor %}
            </div>
        </div>
    </section>
