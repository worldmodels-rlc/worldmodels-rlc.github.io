 <!-- Speaker Modals -->
 {% for speaker in site.data.speakers %}
    <div class="portfolio-modal modal fade" id="speakerModal{{ speaker.id }}" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-content">
            <div class="close-modal" data-dismiss="modal">
                <div class="lr">
                    <div class="rl">
                    </div>
                </div>
            </div>
            <div class="container">
                <div class="row">
                    <div class="col-lg-8 col-lg-offset-2">
                        <div class="modal-body">
                            <h2>{{ speaker.name }}</h2>
                            <hr class="star-primary">
                            <p class="text-muted"><strong>{{ speaker.title }}</strong>, {{ speaker.affiliation }}</p>
                            <p>{{ speaker.bio }}</p>
                            <ul class="list-inline item-details">
                                <li>Status: <strong>{{ speaker.status }}</strong></li>
                            </ul>
                            <button type="button" class="btn btn-default" data-dismiss="modal"><i class="fa fa-times"></i> Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endfor %}
