<!-- Organizers Section -->
    <section id="organizers" class="bg-light-gray">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2 class="section-heading">Organizers</h2>
                    <h3 class="section-subheading text-muted">Researchers from Mila, McGill, ETH Zurich, UT Austin, CMU, UBC, and industry.</h3>
                </div>
            </div>
            <div class="row" style="display:flex; flex-wrap:wrap; justify-content:center;">
                {% for member in site.people %}
                <div class="col-sm-3" style="display:flex; justify-content:center;">
                    <div class="team-member">
                        <div style="width:140px;height:140px;border-radius:50%;background:#378ADD;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
                            <i class="fa fa-user fa-4x" style="color:#fff;"></i>
                        </div>
                        <h4>{{ member.name }}</h4>
                        <p class="text-muted">{{ member.position }}</p>
                        <ul class="list-inline social-buttons">
                            {% for network in member.social %}
                            <li>
                                <a href="{{ network.url }}">
                                    <i class="fa fa-{{ network.title }}"></i>
                                </a>
                            </li>
                            {% endfor %}
                        </ul>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
